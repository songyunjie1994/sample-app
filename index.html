<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>寄样管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#4f46e5;--primary-light:#818cf8;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b;--bg:#f1f5f9;--card:#fff;--text:#1e293b;--text2:#64748b;--border:#e2e8f0;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;padding-bottom:80px}
.container{max-width:480px;margin:0 auto;padding:16px}
.container-wide{max-width:800px;margin:0 auto;padding:16px}
.header{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:28px 20px 24px;text-align:center}
.header h1{font-size:22px;font-weight:700}
.header p{opacity:.85;font-size:14px;margin-top:2px}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:200;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.nav-bar a{flex:1;text-align:center;padding:10px 0;text-decoration:none;color:var(--text2);font-size:12px;font-weight:500;transition:.2s}
.nav-bar a .icon{font-size:20px;display:block;margin-bottom:2px}
.nav-bar a.active{color:var(--primary)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:14px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:14px;font-weight:600;color:var(--text);margin-bottom:5px}
.form-group label .required{color:var(--danger)}
.form-control{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-size:16px;color:var(--text);background:var(--card);outline:none;transition:.2s;font-family:inherit;box-sizing:border-box}
.form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
textarea.form-control{resize:vertical;min-height:80px}
select.form-control{-webkit-appearance:auto;appearance:auto}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 24px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit;width:100%;text-decoration:none;color:#fff}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary)}
.btn-primary:hover{background:#4338ca}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-success{background:var(--success)}
.btn-success:hover{background:#16a34a}
.btn-danger{background:var(--danger)}
.btn-danger:hover{background:#dc2626}
.btn-outline{background:var(--card);border:2px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:7px 14px;font-size:13px;width:auto;min-width:64px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);padding:10px 22px;border-radius:10px;font-size:15px;font-weight:500;z-index:999;transition:transform .35s;box-shadow:0 10px 15px -3px rgba(0,0,0,.1);text-align:center;pointer-events:none;max-width:88vw}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast-success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.toast-error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.toast-info{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.status{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;display:inline-block}
.status-pending{background:#fef3c7;color:#92400e}
.status-approved{background:#dcfce7;color:#166534}
.status-rejected{background:#fee2e2;color:#991b1b}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-item{background:var(--card);border-radius:var(--radius);padding:14px 8px;text-align:center;box-shadow:var(--shadow)}
.stat-item .num{font-size:26px;font-weight:700;line-height:1.2}
.stat-item .lbl{font-size:12px;color:var(--text2);margin-top:2px}
.stat-item.pending .num{color:var(--warning)}
.stat-item.approved .num{color:var(--success)}
.stat-item.rejected .num{color:var(--danger)}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:7px 14px;border:2px solid var(--border);border-radius:20px;background:var(--card);font-size:13px;font-weight:500;cursor:pointer;transition:.2s;color:var(--text2);font-family:inherit}
.filter-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.filter-btn:hover:not(.active){border-color:var(--primary-light);color:var(--primary)}
.sub-item{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:10px}
.sub-item .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.sub-item .name{font-size:16px;font-weight:700}
.sub-item .time{font-size:12px;color:var(--text2);margin-top:2px}
.sub-item .info{font-size:14px;color:var(--text2);margin-bottom:2px}
.sub-item .desc{font-size:14px;color:var(--text);background:var(--bg);padding:7px 10px;border-radius:8px;margin-top:6px}
.sub-item .acts{display:flex;gap:8px;margin-top:10px;justify-content:flex-end;flex-wrap:wrap}
.empty{padding:48px 20px;text-align:center;color:var(--text2)}
.empty .icon{font-size:48px;margin-bottom:10px}
.success-page{text-align:center;padding:20px}
.success-page .check{margin:0 auto 16px;width:64px;height:64px;background:var(--success);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;animation:pop .4s}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.success-page h2{font-size:20px;margin-bottom:6px}
.success-page p{color:var(--text2);margin-bottom:20px;font-size:14px}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:90vh;padding:20px}
.login-box{width:100%;max-width:360px}
.login-box .card{padding:28px 20px}
.login-box h2{text-align:center;margin-bottom:20px;font-size:20px}
.setting-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.setting-item:last-child{border-bottom:none}
.setting-item .label{font-size:14px;font-weight:500;color:var(--text)}
.setting-item .hint{font-size:12px;color:var(--text2);width:100%;margin-top:-4px}
.setting-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.export-area{width:100%;min-height:100px;font-size:12px;font-family:monospace;padding:8px;border:1px solid var(--border);border-radius:8px;margin-top:8px;background:var(--bg);color:var(--text)}
.hidden{display:none!important}
.badge{display:inline-block;font-size:11px;background:rgba(255,255,255,.2);padding:1px 8px;border-radius:10px;vertical-align:middle;font-weight:400}
.sync-status{font-size:12px;color:var(--text2);text-align:center;margin-bottom:8px;padding:4px;background:#f8fafc;border-radius:8px}
@media(min-width:768px){.header{padding:40px 20px 32px}.header h1{font-size:28px}.container{max-width:520px;padding:24px}.card{padding:28px}}
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- ===== 用户提交页面 ===== -->
<div id="pageUser">
<div class="header">
<h1>📦 寄样申请 <span class="badge" id="modeBadge" style="display:none"></span></h1>
<p>填写信息提交样品申请</p>
</div>
<div class="container">
<div id="syncStatus" class="sync-status hidden"></div>
<div id="formView">
<div class="card">
<form id="submitForm">
<div class="form-group"><label>商务 <span class="required">*</span></label><input type="text" class="form-control" id="business" placeholder="请输入商务姓名" required></div>
<div class="form-group"><label>姓名 <span class="required">*</span></label><input type="text" class="form-control" id="name" placeholder="请输入您的姓名" required></div>
<div class="form-group"><label>电话 <span class="required">*</span></label><input type="tel" class="form-control" id="phone" placeholder="请输入手机号码" required onblur="checkRepeatPhone()"></div>
<div class="form-group"><label>地址 <span class="required">*</span></label><input type="text" class="form-control" id="address" placeholder="请输入地址" required></div>

<div class="form-group">
<label style="display:flex;justify-content:space-between;align-items:center">
<span>货品与数量 <span class="required">*</span></span>
<button type="button" class="btn btn-sm btn-outline" onclick="addItemRow()" style="width:auto;padding:4px 12px;font-size:12px">+ 添加货品</button>
</label>
<div id="itemsContainer">
<div class="item-row" style="display:flex;gap:8px;margin-bottom:8px">
<select class="form-control" style="flex:2" required>
<option value="">请选择</option>
<option value="VITAFOLKS甘露糖">甘露糖</option>
<option value="BriBeam牙膏套盒">BB牙膏套盒</option>
<option value="VITAFOLKS红宝盒">红宝盒</option>
<option value="MaxHealthy精氨酸">精氨酸</option>
<option value="VITAFOLKS夜燃片【新】">夜燃片【新】</option>
<option value="MaxHealthy 男士营养包">男士营养包</option>
<option value="MaxHealthy 女士营养包">女士营养包</option>
<option value="MaxHealthy血糖片【新】">血糖片【新】</option>
<option value="VITAFOLKS卡路里【新】">卡路里【新】</option>
<option value="VITAFOLKS花园卫士">花园卫士</option>
<option value="MaxHealthy胶原蛋白胶囊">胶原蛋白胶囊</option>
<option value="MaxHealthy解酒片">解酒片</option>
<option value="Bioellis麦角硫因【新】">麦角硫因【新】</option>
<option value="MaxHealthy 护肝片【新283】">护肝片【新283】</option>
<option value="Tessmel双仓替尔泊肽【多】">Tessmel双仓替尔泊肽【多】</option>
<option value="Tessmel双仓替尔泊肽【少】">Tessmel双仓替尔泊肽【少】</option>
<option value="Tessmel超模密码（新）">超模密码（新）</option>
<option value="Tessmel 16小时日燃">16小时日燃</option>
<option value="Tessmel 8小时夜燃">8小时夜燃</option>
<option value="Bioellis麦角硫因【更新】">麦角硫因【更新】</option>
<option value="Bioellis美白丸">Bioellis美白丸</option>
<option value="Bioellis反重力">Bioellis反重力</option>
<option value="VITAFOLKS BHB燃脂">BHB燃脂</option>
<option value="VITAFOLKS 21天排排宝">21天排排宝</option>
<option value="VITAMEE 清清片">清清片</option>
<option value="Tessmel双仓替尔泊肽（TR）">Tessmel双仓替尔泊肽（TR）</option>
</select>
<input type="text" class="form-control" style="flex:1" placeholder="数量" required>
<button type="button" class="btn btn-sm btn-danger" onclick="removeItemRow(this)" style="width:auto;padding:4px 10px;font-size:14px">✕</button>
</div>
</div>
</div>

<div class="form-group">
<label>是否顺丰 <span class="required">*</span></label>
<div style="display:flex;gap:16px;margin-top:4px">
<label style="font-weight:400;font-size:15px;display:flex;align-items:center;gap:4px"><input type="radio" name="sfRadio" value="是" checked> 是</label>
<label style="font-weight:400;font-size:15px;display:flex;align-items:center;gap:4px"><input type="radio" name="sfRadio" value="否"> 否</label>
</div>
</div>

<div class="form-group"><label>发货日期 <span class="required">*</span></label><input type="date" class="form-control" id="shipDate" required></div>

<div id="repeatWarning" class="hidden" style="background:#fef3c7;border:1px solid #f59e0b;border-radius:10px;padding:12px;margin-bottom:14px;font-size:14px;color:#92400e">
⚠️ 该手机号已有通过审核的申请，请说明重复申请原因：
<textarea class="form-control" id="repeatReason" placeholder="请说明为什么需要再次申请" style="margin-top:6px;min-height:60px"></textarea>
</div>

<div class="form-group"><label>备注说明</label><textarea class="form-control" id="description" placeholder="其他备注信息（选填）" rows="3"></textarea></div>
<button type="submit" class="btn btn-primary" id="submitBtn">提交申请</button>
</form>
</div>
<p style="text-align:center;font-size:13px;color:var(--text2);margin-top:4px">提交后等待管理审核</p>
</div>

<div id="successView" class="hidden">
<div class="card">
<div class="success-page">
<div class="check">✓</div>
<h2>提交成功！</h2>
<p>您的样品申请已提交，请等待审核。</p>
<button class="btn btn-outline" onclick="resetForm()">继续提交</button>
</div>
</div>
</div>
</div>
</div>

<!-- ===== 管理页面 ===== -->
<div id="pageAdmin" class="hidden">
<div id="loginView" class="login-wrap">
<div class="login-box">
<div class="card">
<h2>🔐 管理登录</h2>
<div>
<div class="form-group"><label>管理密码</label><input type="password" class="form-control" id="loginPassword" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')doLogin()"></div>
<button type="button" class="btn btn-primary" onclick="doLogin()">登录</button>
</div>
</div>
</div>
</div>

<div id="adminView" class="hidden">
<div class="header" style="padding:20px;display:flex;justify-content:space-between;align-items:center;border-radius:0">
<div><h1 style="font-size:18px">📋 寄样管理 <span class="badge" id="adminModeBadge" style="display:none"></span></h1><p style="font-size:12px">共 <span id="totalLabel">0</span> 条记录</p></div>
<div><button class="btn btn-sm btn-outline" onclick="showSettings()" style="background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4);color:#fff;width:auto;margin-right:6px">⚙️</button><button class="btn btn-sm btn-outline" onclick="logout()" style="background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4);color:#fff;width:auto">退出</button></div>
</div>
<div class="container-wide">
<div id="syncStatusAdmin" class="sync-status hidden"></div>
<div class="stats">
<div class="stat-item pending"><div class="num" id="sPending">0</div><div class="lbl">待审核</div></div>
<div class="stat-item approved"><div class="num" id="sApproved">0</div><div class="lbl">已通过</div></div>
<div class="stat-item rejected"><div class="num" id="sRejected">0</div><div class="lbl">已拒绝</div></div>
</div>
<div class="filter-bar">
<button class="filter-btn active" data-s="">全部</button>
<button class="filter-btn" data-s="pending">待审核</button>
<button class="filter-btn" data-s="approved">已通过</button>
<button class="filter-btn" data-s="rejected">已拒绝</button>
</div>
<div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
<span style="font-size:13px;color:var(--text2);font-weight:500">📅 发货日期筛选：</span>
<input type="date" id="filterShipDate" style="padding:6px 10px;border:2px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--card);color:var(--text)">
<button class="btn btn-sm btn-primary" onclick="applyDateFilter()" style="width:auto">筛选</button>
<button class="btn btn-sm btn-outline" onclick="clearDateFilter()" style="width:auto">清除</button>
<button class="btn btn-sm btn-success" onclick="exportFiltered()" style="width:auto;margin-left:auto">📊 导出筛选结果</button>
</div>
<div id="subList"></div>
<div style="display:flex;justify-content:center;align-items:center;gap:12px;margin:16px 0">
<button class="btn btn-sm btn-outline" id="prevPage" style="width:auto" onclick="changePage(-1)">← 上一页</button>
<span style="font-size:13px;color:var(--text2)" id="pageInfo">第 1 页</span>
<button class="btn btn-sm btn-outline" id="nextPage" style="width:auto" onclick="changePage(1)">下一页 →</button>
</div>
</div>
</div>
</div>

<!-- ===== 设置弹窗 ===== -->
<div id="settingsModal" style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center;padding:20px">
<div style="background:var(--card);border-radius:var(--radius);max-width:420px;width:100%;max-height:80vh;overflow-y:auto;padding:24px 20px">
<h3 style="margin-bottom:16px">⚙️ 设置</h3>
<div class="setting-item"><span class="label">🔑 管理密码</span><div class="setting-right"><input type="text" class="form-control" id="setPassword" style="width:140px;padding:6px 10px;font-size:14px"><button class="btn btn-sm btn-primary" onclick="savePassword()" style="width:auto;margin-top:4px">保存</button></div></div>
<div style="margin:16px 0;border-top:2px solid var(--primary);padding-top:12px">
<h4 style="font-size:15px;margin-bottom:8px">☁️ GitHub 云同步设置</h4>
<p style="font-size:12px;color:var(--text2);margin-bottom:10px">数据通过 GitHub API 存储在仓库中，<strong>完全免费不限量</strong>。</p>
<div class="setting-item"><span class="label">🔑 GitHub Token</span><div class="setting-right"><input type="text" class="form-control" id="githubToken" style="width:220px;padding:6px 10px;font-size:13px" placeholder="粘贴 GitHub Token"></div></div>
<div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-sm btn-primary" onclick="saveGithub()" style="width:auto">保存</button><button class="btn btn-sm btn-outline" onclick="clearGithub()" style="width:auto">清除</button></div>
<div id="githubStatus" style="font-size:12px;color:var(--text2);margin-top:6px"></div>
</div>
<div class="setting-item"><span class="label">📊 导出数据</span><button class="btn btn-sm btn-primary" onclick="exportData()" style="width:auto">导出</button></div>
<div class="setting-item" style="border-bottom:none"><span class="label">📥 导入数据</span><div><button class="btn btn-sm btn-outline" onclick="document.getElementById('importFile').click()" style="width:auto">选择文件</button><input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)"></div></div>
<div id="exportArea" class="hidden" style="margin-top:12px"><textarea class="export-area" id="exportText" readonly></textarea><button class="btn btn-sm btn-primary" onclick="copyExport()" style="width:auto;margin-top:6px">📋 复制</button></div>
<button class="btn btn-outline" onclick="closeSettings()" style="margin-top:16px">关闭</button>
</div>
</div>

<div class="nav-bar">
<a href="javascript:void(0)" id="navUser" class="active" onclick="switchPage('user')"><span class="icon">📝</span>提交申请</a>
<a href="javascript:void(0)" id="navAdmin" onclick="switchPage('admin')"><span class="icon">🔐</span>管理审核</a>
</div>

<script>
// ===== 页面切换 =====
function switchPage(page) {
  if (page === 'admin') { checkLogin(); return; }
  document.getElementById('pageUser').classList.remove('hidden');
  document.getElementById('pageAdmin').classList.add('hidden');
  document.getElementById('navUser').classList.add('active');
  document.getElementById('navAdmin').classList.remove('active');
}

// ===== 数据层 =====
var _DEFAULT_TOKEN_B64 = 'Z2hwX3p0eUNiZDkxVlZKYklRS2ZwVFgyV2dYU1BaREsyUzBrVDFPdg==';
var GITHUB_TOKEN = localStorage.getItem('github_token') || (function(){try{return atob(_DEFAULT_TOKEN_B64)}catch(e){return ''}})();
var GITHUB_REPO = 'songyunjie1994/sample-app';
var GITHUB_FILE = 'data.json';
var isCloudMode = !!(localStorage.getItem('github_token') || _DEFAULT_TOKEN_B64); // 默认开启云同步
var _fileSha = null;

function defaultData() { return { nextId:1, submissions:[], adminPassword:'admin123' }; }

function toast(msg,type) {
  var t=document.getElementById('toast'); t.textContent=msg; t.className='toast toast-'+type+' show';
  clearTimeout(t._timer); t._timer=setTimeout(function(){t.classList.remove('show')},2500);
}

function showSyncStatus(msg) {
  var e1=document.getElementById('syncStatus'),e2=document.getElementById('syncStatusAdmin');
  if(e1){e1.textContent=msg;e1.classList.remove('hidden')} if(e2){e2.textContent=msg;e2.classList.remove('hidden')}
}
function hideSyncStatus() {
  var e1=document.getElementById('syncStatus'),e2=document.getElementById('syncStatusAdmin');
  if(e1)e1.classList.add('hidden'); if(e2)e2.classList.add('hidden');
}

async function loadFromGithub() {
  if(!GITHUB_TOKEN) return null;
  try {
    var r=await fetch('https://api.github.com/repos/'+GITHUB_REPO+'/contents/'+GITHUB_FILE,{headers:{'Authorization':'token '+GITHUB_TOKEN,'Accept':'application/vnd.github.v3+json'}});
    if(!r.ok) throw Error('HTTP '+r.status);
    var j=await r.json(); _fileSha=j.sha; return JSON.parse(atob(j.content.replace(/\n/g,'')));
  }catch(e){console.error('GitHub load fail:',e);return null}
}

async function saveToGithub(d) {
  if(!GITHUB_TOKEN) return false;
  try {
    var content=btoa(unescape(encodeURIComponent(JSON.stringify(d))));
    var body={message:'update data',content:content}; if(_fileSha) body.sha=_fileSha;
    var r=await fetch('https://api.github.com/repos/'+GITHUB_REPO+'/contents/'+GITHUB_FILE,{method:'PUT',headers:{'Authorization':'token '+GITHUB_TOKEN,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},body:JSON.stringify(body)});
    if(r.ok){var j=await r.json();_fileSha=j.content.sha} return r.ok;
  }catch(e){console.error('GitHub save fail:',e);return false}
}

var data = defaultData();

async function initData() {
  if(isCloudMode){
    showSyncStatus('☁️ 正在同步数据...');
    var cd=await loadFromGithub();
    if(cd&&cd.submissions&&cd.submissions.length>0){data=cd;hideSyncStatus();showBadge('☁️ GitHub 云同步');return}
    // 云端无数据，将本地数据上传
    try{var l=localStorage.getItem('sampleData');if(l){data=JSON.parse(l);if(data.submissions&&data.submissions.length>0){saveToGithub(data);showBadge('☁️ GitHub 云同步');hideSyncStatus();return}}}catch(e){}
    showSyncStatus('⚠️ 云端加载失败');
  }
  try{var l=localStorage.getItem('sampleData');if(l)data=JSON.parse(l)}catch(e){}
  showBadge(isCloudMode?'☁️ GitHub 云同步':'💻 本地');hideSyncStatus();
}

function showBadge(t) {
  var b1=document.getElementById('modeBadge'),b2=document.getElementById('adminModeBadge');
  if(b1){b1.style.display='inline';b1.textContent=t} if(b2){b2.style.display='inline';b2.textContent=t}
}

var _saveTimer=null;
function saveData(d) {
  data=d; localStorage.setItem('sampleData',JSON.stringify(d));
  if(isCloudMode){
    showSyncStatus('☁️ 保存中...');clearTimeout(_saveTimer);
    _saveTimer=setTimeout(async function(){
      var ok=await saveToGithub(d);
      if(ok){showSyncStatus('☁️ 已同步');setTimeout(hideSyncStatus,2000)}
      else showSyncStatus('⚠️ 同步失败');
    },500);
  }
}

}

function refreshAdmin(){

  document.getElementById('totalLabel').textContent=t;
  document.getElementById('sPending').textContent=data.submissions.filter(function(s){return s.status==='pending'}).length;
  document.getElementById('sApproved').textContent=data.submissions.filter(function(s){return s.status==='approved'}).length;

function renderList(){
  var list=document.getElementById('subList');
  var filtered=data.submissions;
  if(currentStatus) filtered=filtered.filter(function(s){return s.status===currentStatus});
  if(currentShipDate) filtered=filtered.filter(function(s){return s.shipDate===currentShipDate});
  var total=filtered.length,limit=20,pages=Math.max(1,Math.ceil(total/limit));
  if(currentPage>pages) currentPage=pages;
  var offset=(currentPage-1)*limit;
  var rows=filtered.slice(offset,offset+limit);
  if(rows.length===0) list.innerHTML='<div class="empty"><div class="icon">📭</div><p>暂无记录</p></div>';
  else list.innerHTML=rows.map(function(item){return renderCard(item)}).join('');
  document.getElementById('pageInfo').textContent='第 '+currentPage+' / '+pages+' 页（共 '+total+' 条）';
  document.getElementById('prevPage').disabled=currentPage<=1;
  document.getElementById('nextPage').disabled=currentPage>=pages;
}

function statusHtml(s){
  if(s==='pending') return '<span class="status status-pending">⏳ 待审核</span>';
  if(s==='approved') return '<span class="status status-approved">✅ 已通过</span>';
  return '<span class="status status-rejected">❌ 已拒绝</span>';
}

function renderCard(item){
  var acts;
  if(item.status==='pending') acts='<button class="btn btn-sm btn-success" onclick="review('+item.id+',\'approved\')">通过</button><button class="btn btn-sm btn-danger" onclick="review('+item.id+',\'rejected\')">拒绝</button><button class="btn btn-sm btn-outline" onclick="delItem('+item.id+')">删除</button>';
  else acts='<button class="btn btn-sm btn-outline" onclick="delItem('+item.id+')">删除</button>';
  var desc=item.description?'<div class="desc">📝 '+item.description+'</div>':'';
  var addr=item.address?'<div class="info">📍 '+item.address+'</div>':'';
  var biz=item.business?'<div class="info">👤 商务:'+item.business+'</div>':'';
  var itemsDisplay=item.itemSummary?'<div class="info">📦 '+item.itemSummary+'</div>':'';
  var sfDisplay=item.isSF?'<div class="info">🚚 '+(item.isSF==='是'?'顺丰':'非顺丰')+'</div>':'';
  var ship=item.shipDate?'<div class="info">📅 '+item.shipDate+'</div>':'';
  var repeat=item.repeatReason?'<div class="desc">🔄 重复原因:'+item.repeatReason+'</div>':'';
  return '<div class="sub-item" id="si-'+item.id+'">'+
    '<div class="top"><span class="name">'+item.name+'</span>'+statusHtml(item.status)+'</div>'+
    '<div class="info">📞 '+item.phone+'</div>'+
    biz+itemsDisplay+sfDisplay+ship+addr+repeat+
    '<div class="time">🕐 '+item.created_at+'</div>'+desc+
    '<div class="acts">'+acts+'</div></div>';
}

function review(id,action){
  var txt=action==='approved'?'通过':'拒绝';
  if(!confirm('确定'+txt+'这个申请吗？')) return;
  var item=data.submissions.find(function(s){return s.id===id});
  if(!item){toast('未找到','error');return}
  if(item.status!=='pending'){toast('该申请已被处理','error');return}
  item.status=action;item.updated_at=nowStr();saveData(data);
  toast(action==='approved'?'已通过':'已拒绝','success');renderList();
}

function delItem(id){
  if(!confirm('确定删除吗？不可恢复！')) return;
  var idx=data.submissions.findIndex(function(s){return s.id===id});
  if(idx===-1){toast('未找到','error');return}
  data.submissions.splice(idx,1);saveData(data);toast('已删除','info');renderList();
}

function exportFiltered(){
  var shipDate=document.getElementById('filterShipDate').value;
  if(!shipDate){toast('请先选择发货日期再导出','error');return}
  var filtered=data.submissions.filter(function(s){return s.shipDate===shipDate});
  if(filtered.length===0){toast('该日期没有数据','error');return}
  var headers=['店铺名称','原始单号','收件人','省','市','区','手机','固话','邮编','网名','地址','发货条件','应收合计','已付金额','邮费','优惠金额','COD买家费用','仓库名称','物流公司','下单时间','付款时间','买家备注','客服备注','分销商','发票抬头','发票内容','支付方式','业务员','商家编码','货品数量'];
  var rows=[headers];
  filtered.forEach(function(item,idx){
    var orderNo=shipDate.replace(/-/g,'')+String(idx+1).padStart(3,'0');
    // 展开多货品为多行
    var itemsArr=[];
    try{if(item.items)itemsArr=JSON.parse(item.items)}catch(e){}
    if(itemsArr.length>0){
      itemsArr.forEach(function(it){
        var pdb=lookupProduct(it.product)||{code:it.product||'',barcode:''};
        rows.push(['店铺vitafolks',orderNo,item.name||'','','','',item.phone||'','','','',item.address||'','款到发货','0','0','0','0','0','','',item.created_at||'','',item.description||'','','','','','',item.business||'',pdb.code,it.quantity]);
      });
    }else{
      var pdb=lookupProduct(item.product)||{code:item.product||'',barcode:''};
      rows.push(['店铺vitafolks',orderNo,item.name||'','','','',item.phone||'','','','',item.address||'','款到发货','0','0','0','0','0','','',item.created_at||'','',item.description||'','','','','','',item.business||'',pdb.code,item.quantity||'1']);
    }
  });
  var csv=rows.map(function(r){return r.map(function(c){return '"'+(c||'').replace(/"/g,'""')+'"'}).join(',')}).join('\n');
  var bom='﻿';
  var blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='寄样_'+shipDate+'.csv';

function exportData(){var area=document.getElementById('exportArea'),text=document.getElementById('exportText');var exp={exportTime:nowStr(),version:'1.0',data:data};text.value=JSON.stringify(exp,null,2);area.classList.remove('hidden');var blob=new Blob([text.value],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='sample-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);toast('已导出','success')}
function copyExport(){var text=document.getElementById('exportText');text.select();navigator.clipboard.writeText(text.value).then(function(){toast('已复制','success')})}
function importData(ev){var file=ev.target.files[0];if(!file)return;var reader=new FileReader();reader.onload=function(e){try{var obj=JSON.parse(e.target.result);if(!obj.data||!obj.data.submissions){toast('文件格式无效','error');return}if(!confirm('导入将覆盖现有数据，确认继续？'))return;data=obj.data;saveData(data);toast('导入成功！共 '+data.submissions.length+' 条记录','success');refreshAdmin();closeSettings()}catch(err){toast('文件解析失败','error')}};reader.readAsText(file);ev.target.value=''}
document.getElementById('settingsModal').addEventListener('click',function(e){if(e.target===this)closeSettings()});

// ===== 哈希路由 =====
function handleHash() {
  var hash=location.hash.replace('#','')||'user';
  if(hash==='admin') checkLogin(); else showPage('user');
}
window.addEventListener('hashchange',handleHash);

// ===== 初始化 =====
handleHash();
initData().then(function(){
  var hash=location.hash.replace('#','')||'user';
  if(hash==='admin')refreshAdmin();
}).catch(function(e){console.error('init error:',e)});
</script>
