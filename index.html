<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>寄样管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#4f46e5;--primary-light:#818cf8;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b;--bg:#f1f5f9;--card:#fff;--text:#1e293b;--text2:#64748b;--border:#e2e8f0;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.08)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;padding-bottom:80px}
.container{max-width:480px;margin:0 auto;padding:16px}
.container-wide{max-width:800px;margin:0 auto;padding:16px}
.header{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:28px 20px 24px;text-align:center}
.header h1{font-size:22px;font-weight:700}
.header p{opacity:.85;font-size:14px;margin-top:2px}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:200;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.nav-bar a{flex:1;text-align:center;padding:10px 0;text-decoration:none;color:var(--text2);font-size:12px;font-weight:500;transition:.2s}
.nav-bar a .icon{font-size:20px;display:block;margin-bottom:2px}
.nav-bar a.active{color:var(--primary)}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:14px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:14px;font-weight:600;color:var(--text);margin-bottom:5px}
.form-group label .required{color:var(--danger)}
.form-control{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-size:16px;color:var(--text);background:var(--card);outline:none;transition:.2s;font-family:inherit}
.form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
textarea.form-control{resize:vertical;min-height:80px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 24px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:.2s;font-family:inherit;width:100%;text-decoration:none;color:#fff}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary)}
.btn-primary:hover{background:#4338ca}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.btn-success{background:var(--success)}
.btn-success:hover{background:#16a34a}
.btn-danger{background:var(--danger)}
.btn-danger:hover{background:#dc2626}
.btn-outline{background:var(--card);border:2px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:7px 14px;font-size:13px;width:auto;min-width:64px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);padding:10px 22px;border-radius:10px;font-size:15px;font-weight:500;z-index:999;transition:transform .35s;box-shadow:0 10px 15px -3px rgba(0,0,0,.1);text-align:center;pointer-events:none;max-width:88vw}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast-success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.toast-error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.toast-info{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.status{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;display:inline-block}
.status-pending{background:#fef3c7;color:#92400e}
.status-approved{background:#dcfce7;color:#166534}
.status-rejected{background:#fee2e2;color:#991b1b}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-item{background:var(--card);border-radius:var(--radius);padding:14px 8px;text-align:center;box-shadow:var(--shadow)}
.stat-item .num{font-size:26px;font-weight:700;line-height:1.2}
.stat-item .lbl{font-size:12px;color:var(--text2);margin-top:2px}
.stat-item.pending .num{color:var(--warning)}
.stat-item.approved .num{color:var(--success)}
.stat-item.rejected .num{color:var(--danger)}
.filter-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:7px 14px;border:2px solid var(--border);border-radius:20px;background:var(--card);font-size:13px;font-weight:500;cursor:pointer;transition:.2s;color:var(--text2);font-family:inherit}
.filter-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.filter-btn:hover:not(.active){border-color:var(--primary-light);color:var(--primary)}
.sub-item{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:10px}
.sub-item .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.sub-item .name{font-size:16px;font-weight:700}
.sub-item .time{font-size:12px;color:var(--text2);margin-top:2px}
.sub-item .info{font-size:14px;color:var(--text2);margin-bottom:2px}
.sub-item .desc{font-size:14px;color:var(--text);background:var(--bg);padding:7px 10px;border-radius:8px;margin-top:6px}
.sub-item .acts{display:flex;gap:8px;margin-top:10px;justify-content:flex-end;flex-wrap:wrap}
.empty{padding:48px 20px;text-align:center;color:var(--text2)}
.empty .icon{font-size:48px;margin-bottom:10px}
.success-page{text-align:center;padding:20px}
.success-page .check{margin:0 auto 16px;width:64px;height:64px;background:var(--success);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;animation:pop .4s}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.success-page h2{font-size:20px;margin-bottom:6px}
.success-page p{color:var(--text2);margin-bottom:20px;font-size:14px}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:90vh;padding:20px}
.login-box{width:100%;max-width:360px}
.login-box .card{padding:28px 20px}
.login-box h2{text-align:center;margin-bottom:20px;font-size:20px}
.setting-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
.setting-item:last-child{border-bottom:none}
.setting-item .label{font-size:14px;font-weight:500;color:var(--text)}
.setting-item .hint{font-size:12px;color:var(--text2);width:100%;margin-top:-4px}
.setting-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.export-area{width:100%;min-height:100px;font-size:12px;font-family:monospace;padding:8px;border:1px solid var(--border);border-radius:8px;margin-top:8px;background:var(--bg);color:var(--text)}
.hidden{display:none!important}
.badge{display:inline-block;font-size:11px;background:rgba(255,255,255,.2);padding:1px 8px;border-radius:10px;vertical-align:middle;font-weight:400}
.sync-status{font-size:12px;color:var(--text2);text-align:center;margin-bottom:8px;padding:4px;background:#f8fafc;border-radius:8px}
@media(min-width:768px){.header{padding:40px 20px 32px}.header h1{font-size:28px}.container{max-width:520px;padding:24px}.card{padding:28px}}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- ===== 用户提交页面 ===== -->
<div id="pageUser">
  <div class="header">
    <h1>📦 寄样申请 <span class="badge" id="modeBadge" style="display:none"></span></h1>
    <p>填写信息提交样品申请</p>
  </div>
  <div class="container">
    <div id="syncStatus" class="sync-status hidden"></div>

    <div id="formView">
      <div class="card">
        <form id="submitForm">
          <div class="form-group">
            <label>姓名 <span class="required">*</span></label>
            <input type="text" class="form-control" id="name" placeholder="请输入您的姓名" required>
          </div>
          <div class="form-group">
            <label>电话 <span class="required">*</span></label>
            <input type="tel" class="form-control" id="phone" placeholder="请输入手机号码" required>
          </div>
          <div class="form-group">
            <label>商务 <span class="required">*</span></label>
            <input type="text" class="form-control" id="business" placeholder="请输入商务姓名" required>
          </div>
          <div class="form-group">
            <label>地址</label>
            <input type="text" class="form-control" id="address" placeholder="请输入地址（选填）">
          </div>
          <div class="form-group">
            <label>货品名称 <span class="required">*</span></label>
            <input type="text" class="form-control" id="product" placeholder="请输入样品名称" required>
          </div>
          <div class="form-group">
            <label>规格/型号</label>
            <input type="text" class="form-control" id="spec" placeholder="如：500g / A4 / XL（选填）">
          </div>
          <div class="form-group">
            <label>数量</label>
            <input type="text" class="form-control" id="quantity" placeholder="如：5个 / 2箱（选填）">
          </div>
          <div class="form-group">
            <label>发货日期 <span class="required">*</span></label>
            <input type="date" class="form-control" id="shipDate" required>
          </div>
          <div class="form-group">
            <label>备注说明</label>
            <textarea class="form-control" id="description" placeholder="样品说明或其他备注（选填）" rows="3"></textarea>
          </div>
          <button type="submit" class="btn btn-primary" id="submitBtn">提交申请</button>
        </form>
      </div>
      <p style="text-align:center;font-size:13px;color:var(--text2);margin-top:4px;">提交后等待管理审核</p>
    </div>

    <div id="successView" class="hidden">
      <div class="card">
        <div class="success-page">
          <div class="check">✓</div>
          <h2>提交成功！</h2>
          <p>您的样品申请已提交，请等待审核。</p>
          <button class="btn btn-outline" onclick="resetForm()">继续提交</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 管理页面 ===== -->
<div id="pageAdmin" class="hidden">
  <div id="loginView" class="login-wrap">
    <div class="login-box">
      <div class="card">
        <h2>🔐 管理登录</h2>
        <div>
          <div class="form-group">
            <label>管理密码</label>
            <input type="password" class="form-control" id="loginPassword" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')doLogin()">
          </div>
          <button type="button" class="btn btn-primary" onclick="doLogin()">登录</button>
        </div>
      </div>
    </div>
  </div>

  <div id="adminView" class="hidden">
    <div class="header" style="padding:20px;display:flex;justify-content:space-between;align-items:center;border-radius:0">
      <div>
        <h1 style="font-size:18px">📋 寄样管理 <span class="badge" id="adminModeBadge" style="display:none"></span></h1>
        <p style="font-size:12px">共 <span id="totalLabel">0</span> 条记录</p>
      </div>
      <div>
        <button class="btn btn-sm btn-outline" onclick="showSettings()" style="background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4);color:#fff;width:auto;margin-right:6px">⚙️</button>
        <button class="btn btn-sm btn-outline" onclick="logout()" style="background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.4);color:#fff;width:auto">退出</button>
      </div>
    </div>

    <div class="container-wide">
      <div id="syncStatusAdmin" class="sync-status hidden"></div>

      <div class="stats">
        <div class="stat-item pending"><div class="num" id="sPending">0</div><div class="lbl">待审核</div></div>
        <div class="stat-item approved"><div class="num" id="sApproved">0</div><div class="lbl">已通过</div></div>
        <div class="stat-item rejected"><div class="num" id="sRejected">0</div><div class="lbl">已拒绝</div></div>
      </div>

      <div class="filter-bar">
        <button class="filter-btn active" data-s="">全部</button>
        <button class="filter-btn" data-s="pending">待审核</button>
        <button class="filter-btn" data-s="approved">已通过</button>
        <button class="filter-btn" data-s="rejected">已拒绝</button>
      </div>

      <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap">
        <span style="font-size:13px;color:var(--text2);font-weight:500">📅 发货日期筛选：</span>
        <input type="date" id="filterShipDate" style="padding:6px 10px;border:2px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:var(--card);color:var(--text)">
        <button class="btn btn-sm btn-primary" onclick="applyDateFilter()" style="width:auto">筛选</button>
        <button class="btn btn-sm btn-outline" onclick="clearDateFilter()" style="width:auto">清除</button>
        <button class="btn btn-sm btn-success" onclick="exportFiltered()" style="width:auto;margin-left:auto">📊 导出筛选结果</button>
      </div>

      <div id="subList"></div>

      <div style="display:flex;justify-content:center;align-items:center;gap:12px;margin:16px 0">
        <button class="btn btn-sm btn-outline" id="prevPage" style="width:auto" onclick="changePage(-1)">← 上一页</button>
        <span style="font-size:13px;color:var(--text2)" id="pageInfo">第 1 页</span>
        <button class="btn btn-sm btn-outline" id="nextPage" style="width:auto" onclick="changePage(1)">下一页 →</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== 设置弹窗 ===== -->
<div id="settingsModal" style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--card);border-radius:var(--radius);max-width:420px;width:100%;max-height:80vh;overflow-y:auto;padding:24px 20px">
    <h3 style="margin-bottom:16px">⚙️ 设置</h3>

    <div class="setting-item">
      <span class="label">🔑 管理密码</span>
      <div class="setting-right">
        <input type="text" class="form-control" id="setPassword" style="width:140px;padding:6px 10px;font-size:14px">
        <button class="btn btn-sm btn-primary" onclick="savePassword()" style="width:auto;margin-top:4px">保存</button>
      </div>
    </div>

    <div style="margin:16px 0;border-top:2px solid var(--primary);padding-top:12px">
      <h4 style="font-size:15px;margin-bottom:8px">☁️ GitHub 云同步设置</h4>
      <p style="font-size:12px;color:var(--text2);margin-bottom:10px">
        数据通过 GitHub API 存储在仓库中，<strong>完全免费不限量</strong>。
      </p>
      <div class="setting-item">
        <span class="label">🔑 GitHub Token</span>
        <div class="setting-right">
          <input type="text" class="form-control" id="githubToken" style="width:220px;padding:6px 10px;font-size:13px" placeholder="粘贴 GitHub Token">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-sm btn-primary" onclick="saveGithub()" style="width:auto">保存</button>
        <button class="btn btn-sm btn-outline" onclick="clearGithub()" style="width:auto">清除</button>
      </div>
      <div id="githubStatus" style="font-size:12px;color:var(--text2);margin-top:6px"></div>
    </div>

    <div class="setting-item">
      <span class="label">📊 导出数据</span>
      <button class="btn btn-sm btn-primary" onclick="exportData()" style="width:auto">导出</button>
    </div>

    <div class="setting-item" style="border-bottom:none">
      <span class="label">📥 导入数据</span>
      <div>
        <button class="btn btn-sm btn-outline" onclick="document.getElementById('importFile').click()" style="width:auto">选择文件</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      </div>
    </div>

    <div id="exportArea" class="hidden" style="margin-top:12px">
      <textarea class="export-area" id="exportText" readonly></textarea>
      <button class="btn btn-sm btn-primary" onclick="copyExport()" style="width:auto;margin-top:6px">📋 复制</button>
    </div>

    <button class="btn btn-outline" onclick="closeSettings()" style="margin-top:16px">关闭</button>
  </div>
</div>

<div class="nav-bar">
  <a href="javascript:void(0)" id="navUser" class="active" onclick="switchPage('user')"><span class="icon">📝</span>提交申请</a>
  <a href="javascript:void(0)" id="navAdmin" onclick="switchPage('admin')"><span class="icon">🔐</span>管理审核</a>
</div>

<script>
// ===== 页面切换（在顶部定义，确保任何情况下都能用） =====
function switchPage(page) {
  if (page === 'admin') { checkLogin(); return; }
  document.getElementById('pageUser').classList.remove('hidden');
  document.getElementById('pageAdmin').classList.add('hidden');
  document.getElementById('navUser').classList.add('active');
  document.getElementById('navAdmin').classList.remove('active');
}

// =============================================
//  数据层 - 支持 localStorage + GitHub 云同步
// =============================================

// GitHub 配置（默认用仓库存储，不限量）
var _DEFAULT_TOKEN_B64 = 'Z2hwX1JqM0tHdERCZHFRdGlsRWhuTUs3elg3aUdjN3M1NjFDRmtGNA==';
var GITHUB_TOKEN = localStorage.getItem('github_token') || (function(){try{return atob(_DEFAULT_TOKEN_B64)}catch(e){return ''}})();
var GITHUB_REPO = 'songyunjie1994/sample-app';
var GITHUB_FILE = 'data.json';
var isCloudMode = true; // 默认开启云同步

// 获取当前文件 sha（用于更新）
var _fileSha = null;

// 默认数据
function defaultData() {
  return { nextId: 1, submissions: [], adminPassword: 'admin123' };
}

// Toast
function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast toast-' + type + ' show';
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// 显示同步状态
function showSyncStatus(msg, type) {
  var el1 = document.getElementById('syncStatus');
  var el2 = document.getElementById('syncStatusAdmin');
  if (el1) { el1.textContent = msg; el1.className = 'sync-status' + (type ? ' sync-' + type : ''); el1.classList.remove('hidden'); }
  if (el2) { el2.textContent = msg; el2.className = 'sync-status' + (type ? ' sync-' + type : ''); el2.classList.remove('hidden'); }
}
function hideSyncStatus() {
  var el1 = document.getElementById('syncStatus');
  var el2 = document.getElementById('syncStatusAdmin');
  if (el1) el1.classList.add('hidden');
  if (el2) el2.classList.add('hidden');
}

// 从 GitHub 加载数据
async function loadFromGithub() {
  if (!GITHUB_TOKEN) return null;
  try {
    var res = await fetch('https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + GITHUB_FILE, {
      headers: {
        'Authorization': 'token ' + GITHUB_TOKEN,
        'Accept': 'application/vnd.github.v3+json'
      }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var json = await res.json();
    _fileSha = json.sha;
    var content = atob(json.content.replace(/\n/g, ''));
    return JSON.parse(content);
  } catch (e) {
    console.error('GitHub 加载失败:', e);
    return null;
  }
}

// 保存到 GitHub
async function saveToGithub(data) {
  if (!GITHUB_TOKEN) return false;
  try {
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    var body = { message: 'update data', content: content };
    if (_fileSha) body.sha = _fileSha;

    var res = await fetch('https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + GITHUB_FILE, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + GITHUB_TOKEN,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json'
      },
      body: JSON.stringify(body)
    });
    if (res.ok) {
      var result = await res.json();
      _fileSha = result.content.sha;
    }
    return res.ok;
  } catch (e) {
    console.error('GitHub 保存失败:', e);
    return false;
  }
}

// 全球同步：先尝试云，失败则本地
var data = defaultData();
var loadPromise = null;

async function initData() {
  if (isCloudMode) {
    showSyncStatus('☁️ 正在同步数据...');
    var cloudData = await loadFromGithub();
    if (cloudData && cloudData.submissions) {
      data = cloudData;
      hideSyncStatus();
      showBadge('☁️ GitHub 云同步');
      return;
    }
    showSyncStatus('⚠️ 云端加载失败，使用本地数据', 'error');
  }
  // 从 localStorage 加载
  try {
    var local = localStorage.getItem('sampleData');
    if (local) data = JSON.parse(local);
  } catch (e) {}
  showBadge(isCloudMode ? '☁️ 云(本地缓存)' : '💻 本地');
  hideSyncStatus();
}

function showBadge(text) {
  var b1 = document.getElementById('modeBadge');
  var b2 = document.getElementById('adminModeBadge');
  if (b1) { b1.style.display = 'inline'; b1.textContent = text; }
  if (b2) { b2.style.display = 'inline'; b2.textContent = text; }
}

// 保存数据（自动同步到云）
var _saveTimer = null;
function saveData(d) {
  data = d;
  localStorage.setItem('sampleData', JSON.stringify(d));
  if (isCloudMode) {
    showSyncStatus('☁️ 保存中...');
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(async function() {
      var ok = await saveToGithub(d);
      if (ok) {
        showSyncStatus('☁️ 已同步到 GitHub');
        setTimeout(hideSyncStatus, 2000);
      } else {
        showSyncStatus('⚠️ 云同步失败（数据已存本地）');
      }
    }, 500);
  }
}

// 时间
function nowStr() {
  var d = new Date();
  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
    ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

// =============================================
//  页面逻辑
// =============================================

var currentPage = 1, currentStatus = '', currentShipDate = '';

function showPage(page) {
  document.getElementById('pageUser').classList.toggle('hidden', page !== 'user');
  document.getElementById('pageAdmin').classList.toggle('hidden', page !== 'admin');
  document.getElementById('navUser').classList.toggle('active', page === 'user');
  document.getElementById('navAdmin').classList.toggle('active', page === 'admin');
  if (page === 'admin' && !document.getElementById('adminView').classList.contains('hidden')) refreshAdmin();
}

function handleHash() {
  var hash = location.hash.replace('#', '') || 'user';
  if (hash === 'admin') checkLogin();
  else showPage('user');
}
window.addEventListener('hashchange', handleHash);

// ========== 用户端 ==========
document.getElementById('submitForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var name = document.getElementById('name').value.trim();
  var phone = document.getElementById('phone').value.trim();
  var business = document.getElementById('business').value.trim();
  var address = document.getElementById('address').value.trim();
  var product = document.getElementById('product').value.trim();
  var spec = document.getElementById('spec').value.trim();
  var quantity = document.getElementById('quantity').value.trim();
  var shipDate = document.getElementById('shipDate').value.trim();
  var desc = document.getElementById('description').value.trim();

  if (!name) { toast('请填写姓名', 'error'); return; }
  if (!phone) { toast('请填写电话', 'error'); return; }
  if (!business) { toast('请填写商务', 'error'); return; }
  if (!product) { toast('请填写货品名称', 'error'); return; }
  if (!shipDate) { toast('请选择发货日期', 'error'); return; }

  var btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '提交中...';

  data.submissions.unshift({
    id: data.nextId++,
    name: name, phone: phone,
    business: business,
    address: address, product: product,
    spec: spec, quantity: quantity,
    shipDate: shipDate,
    description: desc,
    status: 'pending',
    created_at: nowStr(), updated_at: nowStr()
  });
  saveData(data);

  btn.disabled = false; btn.textContent = '提交申请';
  document.getElementById('formView').classList.add('hidden');
  document.getElementById('successView').classList.remove('hidden');
  toast('提交成功！', 'success');
});

function resetForm() {
  document.getElementById('submitForm').reset();
  document.getElementById('successView').classList.add('hidden');
  document.getElementById('formView').classList.remove('hidden');
}

// ========== 管理端 ==========
function doLogin() {
  var pwd = document.getElementById('loginPassword').value;
  if (pwd === data.adminPassword) {
    localStorage.setItem('adminLoggedIn', '1');
    showAdmin();
    toast('登录成功', 'success');
  } else {
    toast('密码错误', 'error');
  }
}

function checkLogin() {
  if (localStorage.getItem('adminLoggedIn') === '1') {
    showAdmin();
  } else {
    document.getElementById('loginView').classList.remove('hidden');
    document.getElementById('adminView').classList.add('hidden');
    showPage('admin');
  }
}

function showAdmin() {
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('adminView').classList.remove('hidden');
  showPage('admin');
  refreshAdmin();
}

function logout() {
  localStorage.removeItem('adminLoggedIn');
  document.getElementById('loginView').classList.remove('hidden');
  document.getElementById('adminView').classList.add('hidden');
  toast('已退出', 'info');
}

function refreshAdmin() {
  var total = data.submissions.length;
  var p = data.submissions.filter(function(s) { return s.status === 'pending'; }).length;
  var a = data.submissions.filter(function(s) { return s.status === 'approved'; }).length;
  var r = data.submissions.filter(function(s) { return s.status === 'rejected'; }).length;
  document.getElementById('totalLabel').textContent = total;
  document.getElementById('sPending').textContent = p;
  document.getElementById('sApproved').textContent = a;
  document.getElementById('sRejected').textContent = r;
  renderList();
}

function renderList() {
  var list = document.getElementById('subList');
  var filtered = data.submissions;
  if (currentStatus) filtered = filtered.filter(function(s) { return s.status === currentStatus; });
  if (currentShipDate) filtered = filtered.filter(function(s) { return s.shipDate === currentShipDate; });

  var total = filtered.length;
  var limit = 20;
  var pages = Math.max(1, Math.ceil(total / limit));
  if (currentPage > pages) currentPage = pages;
  var offset = (currentPage - 1) * limit;
  var rows = filtered.slice(offset, offset + limit);

  if (rows.length === 0) {
    list.innerHTML = '<div class="empty"><div class="icon">📭</div><p>暂无记录</p></div>';
  } else {
    list.innerHTML = rows.map(function(item) { return renderCard(item); }).join('');
  }
  document.getElementById('pageInfo').textContent = '第 ' + currentPage + ' / ' + pages + ' 页（共 ' + total + ' 条）';
  document.getElementById('prevPage').disabled = currentPage <= 1;
  document.getElementById('nextPage').disabled = currentPage >= pages;
}

function statusHtml(s) {
  if (s === 'pending') return '<span class="status status-pending">⏳ 待审核</span>';
  if (s === 'approved') return '<span class="status status-approved">✅ 已通过</span>';
  return '<span class="status status-rejected">❌ 已拒绝</span>';
}

function renderCard(item) {
  var acts;
  if (item.status === 'pending') {
    acts = '<button class="btn btn-sm btn-success" onclick="review(' + item.id + ',\'approved\')">通过</button>' +
      '<button class="btn btn-sm btn-danger" onclick="review(' + item.id + ',\'rejected\')">拒绝</button>' +
      '<button class="btn btn-sm btn-outline" onclick="delItem(' + item.id + ')">删除</button>';
  } else {
    acts = '<button class="btn btn-sm btn-outline" onclick="delItem(' + item.id + ')">删除</button>';
  }
  var desc = item.description ? '<div class="desc">📝 ' + item.description + '</div>' : '';
  var addr = item.address ? '<div class="info">📍 ' + item.address + '</div>' : '';
  var prod = item.product ? '<div class="info">📦 ' + item.product + (item.spec ? ' | ' + item.spec : '') + (item.quantity ? ' | ×' + item.quantity : '') + '</div>' : '';
  var ship = item.shipDate ? '<div class="info">🚚 发货日期: ' + item.shipDate + '</div>' : '';
  var biz = item.business ? '<div class="info">👤 商务: ' + item.business + '</div>' : '';
  return '<div class="sub-item" id="si-' + item.id + '">' +
    '<div class="top"><span class="name">' + item.name + '</span>' + statusHtml(item.status) + '</div>' +
    '<div class="info">📞 ' + item.phone + '</div>' +
    biz + prod + ship + addr +
    '<div class="time">🕐 ' + item.created_at + '</div>' +
    desc +
    '<div class="acts">' + acts + '</div></div>';
}

function review(id, action) {
  var txt = action === 'approved' ? '通过' : '拒绝';
  if (!confirm('确定' + txt + '这个申请吗？')) return;
  var item = data.submissions.find(function(s) { return s.id === id; });
  if (!item) { toast('未找到', 'error'); return; }
  if (item.status !== 'pending') { toast('该申请已被处理', 'error'); return; }
  item.status = action;
  item.updated_at = nowStr();
  saveData(data);
  toast(action === 'approved' ? '已通过' : '已拒绝', 'success');
  renderList();
}

function delItem(id) {
  if (!confirm('确定删除吗？不可恢复！')) return;
  var idx = data.submissions.findIndex(function(s) { return s.id === id; });
  if (idx === -1) { toast('未找到', 'error'); return; }
  data.submissions.splice(idx, 1);
  saveData(data);
  toast('已删除', 'info');
  renderList();
}

function changePage(delta) {
  currentPage = Math.max(1, currentPage + delta);
  renderList();
}

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentStatus = btn.getAttribute('data-s');
    currentPage = 1;
    renderList();
  });
});

function applyDateFilter() {
  var val = document.getElementById('filterShipDate').value;
  if (!val) { toast('请选择日期', 'error'); return; }
  currentShipDate = val;
  currentPage = 1;
  renderList();
}
function clearDateFilter() {
  currentShipDate = '';
  document.getElementById('filterShipDate').value = '';
  currentPage = 1;
  renderList();
}

// ========== 设置 ==========
function showSettings() {
  document.getElementById('setPassword').value = data.adminPassword;
  document.getElementById('githubToken').value = GITHUB_TOKEN;
  document.getElementById('githubStatus').textContent = isCloudMode ? '☁️ GitHub 云同步已开启' : '💻 当前使用本地存储';
  document.getElementById('settingsModal').style.display = 'flex';
}

function closeSettings() {
  document.getElementById('settingsModal').style.display = 'none';
  document.getElementById('exportArea').classList.add('hidden');
}

function savePassword() {
  var pwd = document.getElementById('setPassword').value.trim();
  if (!pwd || pwd.length < 4) { toast('密码至少4位', 'error'); return; }
  data.adminPassword = pwd;
  saveData(data);
  toast('密码已更新', 'success');
}

// GitHub 配置
function saveGithub() {
  var token = document.getElementById('githubToken').value.trim();
  if (!token) { toast('请填写 GitHub Token', 'error'); return; }
  GITHUB_TOKEN = token;
  isCloudMode = true;
  localStorage.setItem('github_token', token);
  document.getElementById('githubStatus').textContent = '✅ 配置已保存';
  toast('配置已保存', 'success');
  showBadge('☁️ GitHub 云同步');
}

function clearGithub() {
  if (!confirm('确定清除同步配置？数据不会丢失')) return;
  GITHUB_TOKEN = '';
  isCloudMode = false;
  localStorage.removeItem('github_token');
  document.getElementById('githubToken').value = '';
  document.getElementById('githubStatus').textContent = '💻 已切换为本地存储';
  showBadge('💻 本地');
  toast('已清除云配置', 'info');
}

// 按筛选结果导出（ERP模板格式）
function exportFiltered() {
  var shipDate = document.getElementById('filterShipDate').value;
  if (!shipDate) { toast('请先选择发货日期再导出', 'error'); return; }

  var filtered = data.submissions.filter(function(s) { return s.shipDate === shipDate; });
  if (filtered.length === 0) { toast('该日期没有数据', 'error'); return; }

  // ERP模板列
  var headers = ['店铺名称','原始单号','收件人','省','市','区','手机','固话','邮编','网名','地址','发货条件','应收合计','已付金额','邮费','优惠金额','COD买家费用','仓库名称','物流公司','下单时间','付款时间','买家备注','客服备注','分销商','发票抬头','发票内容','支付方式','业务员','商家编码','货品数量'];

  var rows = [headers];
  filtered.forEach(function(item, idx) {
    var orderNo = shipDate.replace(/-/g,'') + String(idx + 1).padStart(3,'0');
    rows.push([
      '店铺vitafolks',            // 店铺名称
      orderNo,                     // 原始单号
      item.name||'',               // 收件人
      '', '', '',                  // 省 市 区
      item.phone||'',              // 手机
      '', '', '',                  // 固话 邮编 网名
      item.address||'',            // 地址
      '款到发货',                  // 发货条件
      '0','0','0','0','0',         // 金额相关
      '', '',                      // 仓库名称 物流公司
      item.created_at||'',         // 下单时间
      '',                          // 付款时间
      item.description||'',        // 买家备注
      '', '', '', '', '', '',      // 客服备注 分销商 发票抬头 发票内容 支付方式
      item.business||'',           // 业务员
      item.product||'',            // 商家编码
      item.quantity||'1'           // 货品数量
    ]);
  });

  var csv = rows.map(function(r) { return r.map(function(c) { return '"' + (c||'').replace(/"/g,'""') + '"'; }).join(','); }).join('\n');
  var bom = '﻿';
  var blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '寄样_' + shipDate + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  toast('已导出 ' + filtered.length + ' 条', 'success');
}

function exportData() {
  var area = document.getElementById('exportArea');
  var text = document.getElementById('exportText');
  var exp = { exportTime: nowStr(), version: '1.0', data: data };
  text.value = JSON.stringify(exp, null, 2);
  area.classList.remove('hidden');
  var blob = new Blob([text.value], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'sample-backup-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('已导出', 'success');
}

function copyExport() {
  var text = document.getElementById('exportText');
  text.select();
  navigator.clipboard.writeText(text.value).then(function() { toast('已复制', 'success'); });
}

function importData(ev) {
  var file = ev.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var obj = JSON.parse(e.target.result);
      if (!obj.data || !obj.data.submissions) { toast('文件格式无效', 'error'); return; }
      if (!confirm('导入将覆盖现有数据，确认继续？')) return;
      data = obj.data;
      saveData(data);
      toast('导入成功！共 ' + data.submissions.length + ' 条记录', 'success');
      refreshAdmin();
      closeSettings();
    } catch (err) { toast('文件解析失败', 'error'); }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

document.getElementById('settingsModal').addEventListener('click', function(e) {
  if (e.target === this) closeSettings();
});

// ========== 初始化 ==========
// 先切页面，不等数据加载完
handleHash();
// 后台加载数据
initData().then(function() {
  var hash = location.hash.replace('#', '') || 'user';
  if (hash === 'admin') refreshAdmin();
}).catch(function(e) {
  console.error('init error:', e);
});
</script>
